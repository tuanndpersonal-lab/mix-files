name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare fixtures
        shell: bash
        run: |
          mkdir -p fixtures/input
          printf 'fake mp3 1' > fixtures/input/song-a.mp3
          printf 'fake mp3 2' > fixtures/input/song-b.mp3
          printf 'fake mp3 3' > fixtures/input/song-c.mp3

      - name: Run smoke test
        run: bun src/cli.js --input ./fixtures/input --output ./fixtures/output --folders 3 --clean --seed ci

      - name: Verify output count
        shell: bash
        run: |
          count=$(find fixtures/output -type f -name '*.mp3' | wc -l | tr -d ' ')
          test "$count" = "9"
