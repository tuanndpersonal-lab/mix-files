name: Build Python Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "python-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r python_app/requirements-build.txt

      - name: Build app
        run: python scripts/build_python_app.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MixFiles-${{ matrix.os }}
          path: dist/python/*.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/python/*.zip
          generate_release_notes: true
